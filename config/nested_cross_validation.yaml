experiment_name: "NCV_Experiments"
task: "classification"
supports_scaling: true

pca_components:
  - null
  - 0.8
  - 0.9
  - 0.95
  - 0.99

testnames:
  - PhonemicFluency
  - BostonNamingTest
  - MiniMentalStatus
  - RecallWordList
  - RecognizeWordList
  - VerbalFluency

paths:
  metadata_path: "data/splits/train_metadata.csv"
  frozen_split: "data/splits/frozen_split.csv"
  cache_dir: "data/cache"
  results_dir: "results/"

scaling: "standard"

inner: 3
outer: 5

logit_dir: "results/"

targets:
  - cerad_total_score_chandler_binary
  - cerad_total_score_chandler_total
  - binary_mci

feature_configs:
  - config/features/egemaps_voice_quality.yaml
  - config/features/egemaps_prosody.yaml
  - config/features/egemaps_all.yaml
  - config/features/wav2vec2.yaml
  - config/features/hubert.yaml

model_configs:
  - config/models/logreg.yaml
  - config/models/svm.yaml
  - config/models/xgboost.yaml